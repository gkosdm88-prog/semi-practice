<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <!-- ✏️ 여기 제목을 바꿔보세요 -->
  <title>나의 첫 사이트</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, "Pretendard", sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      color: #fff;
    }
    .card {
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(10px);
      border-radius: 20px;
      padding: 48px 40px;
      max-width: 560px;
      width: 100%;
      text-align: center;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
    }
    h1 { font-size: 2.4rem; margin-bottom: 16px; }
    p { font-size: 1.1rem; line-height: 1.7; margin-bottom: 12px; opacity: 0.95; }
    .tag {
      display: inline-block;
      margin-top: 20px;
      padding: 8px 18px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.2);
      font-size: 0.9rem;
    }
  </style>
</head>
<body>
  <div class="card">
    <!-- ✏️ 아래 텍스트들을 자유롭게 수정해보세요 -->
    <h1>안녕하세요 👋</h1>
    <p>저는 세미예요 코딩을 배우고 있어요.</p>
    <p>이 페이지의 글자를 직접 바꿔볼 거예요!</p>
    <span class="tag">AI PT 연습 중</span>
  </div>
</body>
</html>
